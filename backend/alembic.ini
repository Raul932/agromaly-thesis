# ==============================================================================
# Alembic Configuration — Agromaly Backend
# ==============================================================================
# This is the Alembic INI file for migration management.
# The actual database URL is NOT hardcoded here — it is loaded dynamically
# from environment variables inside alembic/env.py.
# ==============================================================================

[alembic]
# Path to migration scripts directory (relative to this ini file)
script_location = alembic

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of the slug in the file name
truncate_slug_length = 40

# Version path for generated migration files
version_path_separator = os

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
